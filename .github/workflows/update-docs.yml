name: Update Documentation and Validate Schema

on:
  push:
    branches:
      - main

jobs:
  validate-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Schema and Rules Consistency Sync Check
        run: npm run sync-docs
